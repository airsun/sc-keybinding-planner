<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SC Dual VKB Binding Planner</title>
    <link rel="stylesheet" href="./styles.css?v=retro-66">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">VKB</span>
          <div>
            <h1>SC Dual VKB Binding Planner</h1>
            <p>本地清单 · 摇杆点选 · 单 JSON 配置</p>
          </div>
        </div>
        <div class="top-actions">
          <div class="profile-controls" aria-label="Profile 配置">
            <span class="profile-kicker">PRF</span>
            <select id="profileSelect" class="profile-select" aria-label="切换 Profile"></select>
            <button id="profileAddBtn" class="panel-button icon-button" type="button" aria-label="新增 Profile" title="新增 Profile">
              <span aria-hidden="true">+</span>
              <span class="sr-only">新增 Profile</span>
            </button>
            <button id="profileDeleteBtn" class="panel-button icon-button" type="button" aria-label="删除当前 Profile" title="删除当前 Profile">
              <span aria-hidden="true">×</span>
              <span class="sr-only">删除当前 Profile</span>
            </button>
          </div>
          <label class="search-box">
            <span>SCAN</span>
            <input id="searchInput" type="search" placeholder="搜索动作、说明、键位">
          </label>
          <button id="toggleCodesBtn" class="panel-button icon-button code-mode-button" type="button" aria-label="切换编号显示" title="切换编号显示">
            <span aria-hidden="true">#</span>
            <span class="sr-only">切换编号显示</span>
          </button>
          <button id="exportBtn" class="panel-button icon-button" type="button" aria-label="导出 JSON" title="导出 JSON">
            <span aria-hidden="true">⇩</span>
            <span class="sr-only">导出 JSON</span>
          </button>
          <label class="panel-button icon-button import-button" aria-label="导入 JSON" title="导入 JSON">
            <span aria-hidden="true">⇧</span>
            <span class="sr-only">导入 JSON</span>
            <input id="importInput" type="file" accept="application/json">
          </label>
        </div>
      </header>

      <main class="workspace">
        <aside id="leftPanel" class="stick-panel"></aside>

        <section class="list-zone">
          <div class="list-controls">
            <div class="tabs" role="tablist" aria-label="清单类型">
              <button id="scenarioTab" class="tab-button active" type="button" data-list="scenario">场景清单</button>
              <button id="gameTab" class="tab-button" type="button" data-list="game">游戏顺序</button>
            </div>
            <div class="top-legend" aria-label="图例说明">
              <span class="legend-item"><span class="legend-code">L/R</span>摇杆</span>
              <span class="legend-item"><span class="legend-code">B/S1/S2</span>层</span>
              <span class="legend-item"><span class="legend-dot green"></span>已绑</span>
              <span class="legend-item"><span class="legend-dot amber"></span>当前</span>
              <span class="legend-item"><span class="legend-dot red"></span>冲突</span>
              <span class="legend-item"><span class="legend-lock"></span>锁定</span>
            </div>
            <div class="filters" aria-label="状态筛选">
              <button class="filter-button active" type="button" data-filter="all">全部</button>
              <button class="filter-button" type="button" data-filter="bound">已绑</button>
              <button class="filter-button" type="button" data-filter="unbound">未分</button>
              <button class="filter-button" type="button" data-filter="locked">锁定</button>
              <button class="filter-button" type="button" data-filter="issue">问题</button>
            </div>
          </div>

          <div id="selectionBar" class="selection-bar">
            <div>
              <span class="selection-kicker">CURRENT TARGET</span>
              <strong id="selectedTitle">选择一行动作，然后点击左右摇杆键位</strong>
            </div>
            <div class="selection-actions">
              <button id="lockBtn" class="small-button" type="button">锁定</button>
              <button id="clearBtn" class="small-button" type="button">解绑</button>
              <input id="noteInput" class="note-input" type="text" placeholder="备注">
            </div>
          </div>

          <div class="card-wrap">
            <div id="bindingRows" class="binding-cards" aria-label="绑定清单"></div>
          </div>
        </section>

        <aside id="rightPanel" class="stick-panel"></aside>
      </main>
    </div>

    <dialog id="codeDialog" class="code-dialog">
      <form method="dialog" class="code-card">
        <header>
          <span id="codeDialogKicker">CODE</span>
          <h2 id="codeDialogTitle">编辑键位编码</h2>
        </header>
        <div id="codeDialogFields" class="code-fields"></div>
        <menu>
          <button id="copyCodeBtn" value="copy" type="button">复制到另一侧</button>
          <button id="recalcCodeBtn" value="recalc" type="button">按 offset 重算</button>
          <button value="cancel">关闭</button>
          <button id="saveCodeBtn" value="default" type="button">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="profileDialog" class="profile-dialog">
      <form method="dialog" class="profile-card">
        <header>
          <span>PROFILE</span>
          <h2>新增 Profile</h2>
        </header>
        <div class="profile-fields">
          <label>
            名称
            <input id="profileNewName" type="text" maxlength="32" autocomplete="off">
          </label>
          <label>
            复制自
            <select id="profileSourceSelect"></select>
          </label>
        </div>
        <menu>
          <button value="cancel">关闭</button>
          <button id="profileCreateBtn" value="default" type="button">创建</button>
        </menu>
      </form>
    </dialog>

    <script src="./data.js?v=retro-4"></script>
    <script src="./app.js?v=retro-28"></script>
  </body>
</html>
